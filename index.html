<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Four Elements Chile</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      color: #f5f3f0;
      line-height: 1.6;
    }

    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      background: linear-gradient(180deg, rgba(10,10,10,0.95) 0%, rgba(10,10,10,0.8) 100%);
      padding: 2rem 2.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px;
      letter-spacing: 4px;
      font-weight: 500;
    }

    nav {
      display: flex;
      gap: 3rem;
      align-items: center;
    }

    nav a {
      font-size: 11px;
      letter-spacing: 1.5px;
      text-decoration: none;
      color: #f5f3f0;
      text-transform: uppercase;
      transition: color 0.3s;
    }

    nav a:hover { color: #d4a574; }

    .nav-right {
      display: flex;
      gap: 1.5rem;
      align-items: center;
    }

    .nav-lang {
      font-size: 11px;
      letter-spacing: 1px;
      border: 1px solid rgba(255,255,255,0.2);
      padding: 0.5rem 1rem;
    }

    .nav-btn {
      padding: 0.7rem 1.8rem;
      border: 1px solid #f5f3f0;
      background: transparent;
      color: #f5f3f0;
      font-size: 11px;
      letter-spacing: 1px;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.3s;
    }

    .nav-btn:hover {
      background: #f5f3f0;
      color: #0a0a0a;
    }

    .nav-btn.primary {
      background: #f5f3f0;
      color: #0a0a0a;
    }

    .hero {
      width: 100%;
      height: 100vh;
      background: linear-gradient(rgba(10,10,10,0.3), rgba(10,10,10,0.5)), url('https://drive.google.com/uc?export=view&id=1iFyWMxbVDHxxpk7j85pMNeGl5w69HCUF');
      background-size: cover;
      background-position: center;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 4rem;
      position: relative;
      margin-top: 80px;
    }

    .hero-location {
      position: absolute;
      bottom: 3rem;
      left: 4rem;
      font-size: 11px;
      letter-spacing: 2px;
      color: #d4a574;
      text-transform: uppercase;
      border: 1px solid #d4a574;
      padding: 0.6rem 1.2rem;
      display: inline-block;
    }

    .hero h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 4.5rem;
      font-weight: 400;
      line-height: 1.1;
      max-width: 900px;
      margin-bottom: 3rem;
    }

    .hero-cta {
      display: inline-block;
      padding: 0.9rem 2.2rem;
      border: 1px solid #d4a574;
      color: #d4a574;
      text-decoration: none;
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      transition: all 0.3s;
    }

    .hero-cta:hover {
      background: #d4a574;
      color: #0a0a0a;
    }
